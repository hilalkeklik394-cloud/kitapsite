}

.kutu{

    margin:auto;
    margin-top:100px;

    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

    color:#2c3e50;
}

    padding:10px 20px;

    border-radius:5px;

    background-color:#2980b9;
}

</head>

</html>
